version: 2
updates:
  - package-ecosystem: pip
    directory: /backend
    schedule:
      interval: weekly
      day: monday
    labels: [dependencies, backend]

  - package-ecosystem: pip
    directory: /bot
    schedule:
      interval: weekly
      day: monday
    labels: [dependencies, bot]

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
    labels: [dependencies, frontend]
    # минорные обновления devDeps шумные — группируем
    groups:
      dev-dependencies:
        dependency-type: development
        update-types: [minor, patch]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels: [dependencies, ci]
