name: Sonar Analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  sonar:
    # PR от dependabot не получают Actions-секреты (SONAR_TOKEN) — скан
    # бессмысленен и падает; bump версии зависимости Sonar-анализа не требует
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: homepage
          POSTGRES_PASSWORD: ${{ github.run_id }}
          POSTGRES_DB: homepage_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U homepage"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Для Sonar нужна полная история

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install coverage

      - name: Run backend tests with coverage
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://homepage:${{ github.run_id }}@localhost:5432/homepage_test
          JWT_SECRET: test-jwt-secret
          INVITE_CODE: test-invite
          CRON_SECRET: test-cron-secret
          TELEGRAM_BOT_TOKEN: test-bot-token
          TELEGRAM_BOT_USERNAME: test_bot
          BOT_SECRET: test-bot-secret
        run: |
          coverage run --source=app -m pytest
          coverage xml -o coverage.xml

      - name: Install bot dependencies
        working-directory: bot
        run: pip install -r requirements.txt -r requirements-dev.txt coverage

      - name: Run bot tests with coverage
        working-directory: bot
        run: |
          coverage run --source=app -m pytest tests
          coverage xml -o coverage.xml

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests with coverage
        working-directory: frontend
        run: npm run test:coverage

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
