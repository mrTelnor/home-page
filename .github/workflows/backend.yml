name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: homepage
          POSTGRES_PASSWORD: homepage
          POSTGRES_DB: homepage_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U homepage"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install ruff

      - name: Lint with ruff
        run: ruff check app tests

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://homepage:homepage@localhost:5432/homepage_test
          JWT_SECRET: test-jwt-secret
          INVITE_CODE: test-invite
          CRON_SECRET: test-cron-secret
          TELEGRAM_BOT_TOKEN: test-bot-token
          TELEGRAM_BOT_USERNAME: test_bot
          BOT_SECRET: test-bot-secret
        run: pytest -v
