sonar.projectKey=mrTelnor_home-page
sonar.organization=mrtelnor

sonar.sources=backend/app,bot/app,frontend/src
sonar.tests=backend/tests,bot/tests
sonar.test.inclusions=frontend/src/**/*.test.ts,frontend/src/**/*.test.tsx

sonar.python.version=3.12
sonar.python.coverage.reportPaths=backend/coverage.xml,bot/coverage.xml
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info

sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/.venv/**,**/venv/**,frontend/src/components/ui/**
sonar.coverage.exclusions=**/tests/**,**/alembic/**,frontend/src/test/**,frontend/src/main.tsx
