---
- name: Install firewalld
  apt:
    name: firewalld
    state: present

- name: Enable and start firewalld
  systemd:
    name: firewalld
    enabled: true
    state: started

- name: Allow SSH on port 9922
  ansible.posix.firewalld:
    port: 9922/tcp
    permanent: true
    immediate: true
    state: enabled

- name: Allow HTTP
  ansible.posix.firewalld:
    service: http
    permanent: true
    immediate: true
    state: enabled

- name: Allow HTTPS
  ansible.posix.firewalld:
    service: https
    permanent: true
    immediate: true
    state: enabled

- name: Remove default SSH service (port 22)
  ansible.posix.firewalld:
    service: ssh
    permanent: true
    immediate: true
    state: disabled
  when: not (firewalld_keep_ssh_22 | default(false))
