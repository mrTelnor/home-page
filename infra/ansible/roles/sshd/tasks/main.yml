---
- name: Set SSH port to 9922
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^#?Port "
    line: "Port 9922"

- name: Disable password authentication
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^#?PasswordAuthentication "
    line: "PasswordAuthentication no"

- name: Disable root login
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^#?PermitRootLogin "
    line: "PermitRootLogin no"

- name: Create ssh.socket override directory
  file:
    path: /etc/systemd/system/ssh.socket.d
    state: directory
    mode: "0755"

- name: Override ssh.socket to listen on port 9922
  copy:
    dest: /etc/systemd/system/ssh.socket.d/override.conf
    content: |
      [Socket]
      ListenStream=
      ListenStream=0.0.0.0:9922
      ListenStream=[::]:9922

- name: Reload systemd daemon
  systemd:
    daemon_reload: true

- name: Restart ssh socket
  systemd:
    name: ssh.socket
    state: restarted

- name: Restart sshd service
  systemd:
    name: ssh
    state: restarted
