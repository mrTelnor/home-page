---
# Чистим dangling-образы перед деплоем (профилактика — образы накапливаются
# после rebuild и занимают место).
- name: Prune dangling Docker images
  command: docker image prune -f
  register: prune_result
  changed_when: "'Total reclaimed space: 0B' not in prune_result.stdout"
  tags: [always]

- name: Create app directory
  file:
    path: /opt/home-page
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"

- name: Create traefik config directory
  file:
    path: /opt/home-page/traefik
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"

- name: Copy docker-compose.yml
  copy:
    src: ../../../docker/docker-compose.yml
    dest: /opt/home-page/docker-compose.yml
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"

- name: Copy traefik.yml
  copy:
    src: ../../../docker/traefik/traefik.yml
    dest: /opt/home-page/traefik/traefik.yml
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"

- name: Sync backend source
  ansible.posix.synchronize:
    src: "{{ inventory_dir }}/../../../backend/"
    dest: /opt/home-page/backend/
    dest_port: "{{ ansible_port | int }}"
    delete: true
    rsync_opts:
      - "--exclude=__pycache__"
      - "--exclude=.pytest_cache"
      - "--exclude=*.egg-info"
  tags: [backend]

- name: Sync cron config
  ansible.posix.synchronize:
    src: "{{ inventory_dir }}/../../docker/cron/"
    dest: /opt/home-page/cron/
    dest_port: "{{ ansible_port | int }}"
    delete: true
  tags: [cron]

- name: Sync frontend source
  ansible.posix.synchronize:
    src: "{{ inventory_dir }}/../../../frontend/"
    dest: /opt/home-page/frontend/
    dest_port: "{{ ansible_port | int }}"
    delete: true
    rsync_opts:
      - "--exclude=node_modules"
      - "--exclude=dist"
  tags: [frontend]

- name: Sync bot source
  ansible.posix.synchronize:
    src: "{{ inventory_dir }}/../../../bot/"
    dest: /opt/home-page/bot/
    dest_port: "{{ ansible_port | int }}"
    delete: true
    rsync_opts:
      - "--exclude=__pycache__"
      - "--exclude=.pytest_cache"
  tags: [bot]

- name: Generate .env from vault variables
  template:
    src: env.j2
    dest: /opt/home-page/.env
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0600"
  tags: [always]

# Единый шаг развёртывания: --build пересобирает изменившиеся образы
# (код вшивается в образ, поэтому без сборки изменения не применяются),
# Docker-кэш делает несменившиеся сервисы near-instant, --remove-orphans
# чистит контейнеры удалённых сервисов. Самовосстанавливается при сломанном
# образе. Используем shell (не docker_compose_v2): у модуля баг в post-action
# `compose images --format json` после --build.
- name: Build and start services
  shell: docker compose up -d --build --remove-orphans
  args:
    chdir: /opt/home-page
  become_user: "{{ ansible_user }}"
  register: compose_up
  changed_when: "'Recreated' in compose_up.stderr or 'Started' in compose_up.stderr or 'Built' in compose_up.stderr"
  tags: [always]
