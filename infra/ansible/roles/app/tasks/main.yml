---
# Чистим dangling-образы перед деплоем (профилактика — образы накапливаются
# после rebuild и занимают место).
- name: Prune dangling Docker images
  command: docker image prune -f
  register: prune_result
  changed_when: "'Total reclaimed space: 0B' not in prune_result.stdout"
  tags: [always]

- name: Create app directory
  file:
    path: /opt/home-page
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"

- name: Create traefik config directory
  file:
    path: /opt/home-page/traefik
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"

- name: Copy docker-compose.yml
  copy:
    src: ../../../docker/docker-compose.yml
    dest: /opt/home-page/docker-compose.yml
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
  notify: Recreate all containers

- name: Copy traefik.yml
  copy:
    src: ../../../docker/traefik/traefik.yml
    dest: /opt/home-page/traefik/traefik.yml
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
  notify: Recreate all containers

- name: Sync backend source
  ansible.posix.synchronize:
    src: "{{ inventory_dir }}/../../../backend/"
    dest: /opt/home-page/backend/
    dest_port: "{{ ansible_port | int }}"
    delete: true
    rsync_opts:
      - "--exclude=__pycache__"
      - "--exclude=.pytest_cache"
      - "--exclude=*.egg-info"
  notify: Recreate backend
  tags: [backend]

- name: Sync cron config
  ansible.posix.synchronize:
    src: "{{ inventory_dir }}/../../docker/cron/"
    dest: /opt/home-page/cron/
    dest_port: "{{ ansible_port | int }}"
    delete: true
  notify: Recreate cron
  tags: [cron]

- name: Sync postgrest config
  ansible.posix.synchronize:
    src: "{{ inventory_dir }}/../../docker/postgrest/"
    dest: /opt/home-page/postgrest/
    dest_port: "{{ ansible_port | int }}"
    delete: true
  notify: Recreate postgrest
  tags: [postgrest]

- name: Sync frontend source
  ansible.posix.synchronize:
    src: "{{ inventory_dir }}/../../../frontend/"
    dest: /opt/home-page/frontend/
    dest_port: "{{ ansible_port | int }}"
    delete: true
    rsync_opts:
      - "--exclude=node_modules"
      - "--exclude=dist"
  notify: Recreate frontend
  tags: [frontend]

- name: Sync bot source
  ansible.posix.synchronize:
    src: "{{ inventory_dir }}/../../../bot/"
    dest: /opt/home-page/bot/
    dest_port: "{{ ansible_port | int }}"
    delete: true
    rsync_opts:
      - "--exclude=__pycache__"
      - "--exclude=.pytest_cache"
  notify: Recreate bot
  tags: [bot]

- name: Generate .env from vault variables
  template:
    src: env.j2
    dest: /opt/home-page/.env
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0600"
  notify: Recreate all containers
  # always — чтобы --tags bot/cron/etc тоже регенерировали .env. Handler
  # сработает только при реальном изменении содержимого.
  tags: [always]

- name: Start services
  shell: docker compose up -d
  args:
    chdir: /opt/home-page
  become_user: "{{ ansible_user }}"
  changed_when: false
