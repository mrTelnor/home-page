# Хендлеров нет: развёртывание выполняет идемпотентный шаг
# "Build and start services" (docker compose up -d --build --remove-orphans)
# в tasks/main.yml. Он пересобирает только изменившиеся образы (Docker-кэш)
# и самовосстанавливается при сломанном образе — отдельные per-service
# хендлеры с --force-recreate больше не нужны.
