networks:
  web:
    name: web
  internal:
    name: internal

volumes:
  letsencrypt:
  pg_data:
  portainer_data:

services:
  traefik:
    image: traefik:v3.6
    container_name: traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - letsencrypt:/letsencrypt
    networks:
      - web
    labels:
      # Dashboard
      - traefik.enable=true
      - traefik.http.routers.traefik.rule=Host(`traefik.${DOMAIN}`)
      - traefik.http.routers.traefik.entrypoints=websecure
      - traefik.http.routers.traefik.tls.certresolver=letsencrypt
      - traefik.http.routers.traefik.service=api@internal
      # IP whitelist
      - traefik.http.routers.traefik.middlewares=admin-ip@docker
      - traefik.http.middlewares.admin-ip.ipallowlist.sourcerange=${HOME_IP}/32

  postgres:
    image: postgres:16
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      INVITE_CODE: ${INVITE_CODE}
      CRON_SECRET: ${CRON_SECRET}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME}
      BOT_SECRET: ${BOT_SECRET}
    networks:
      - web
      - internal
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      - traefik.enable=true
      # API — public
      - traefik.http.routers.backend.rule=Host(`api.${DOMAIN}`)
      - traefik.http.routers.backend.entrypoints=websecure
      - traefik.http.routers.backend.tls.certresolver=letsencrypt
      # Swagger docs — restricted by IP
      - traefik.http.routers.backend-docs.rule=Host(`api.${DOMAIN}`) && (PathPrefix(`/docs`) || PathPrefix(`/openapi.json`) || PathPrefix(`/redoc`))
      - traefik.http.routers.backend-docs.entrypoints=websecure
      - traefik.http.routers.backend-docs.tls.certresolver=letsencrypt
      - traefik.http.routers.backend-docs.middlewares=admin-ip@docker
      - traefik.http.routers.backend-docs.priority=30
      # Service
      - traefik.http.services.backend.loadbalancer.server.port=8000
      - traefik.docker.network=web

  cron:
    build:
      context: ./cron
    container_name: cron
    restart: unless-stopped
    environment:
      CRON_SECRET: ${CRON_SECRET}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      YADISK_USER: ${YADISK_USER}
      YADISK_APP_PASSWORD: ${YADISK_APP_PASSWORD}
    networks:
      - web
      - internal
    depends_on:
      - backend

  bot:
    build:
      context: ./bot
    container_name: bot
    restart: unless-stopped
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      BOT_SECRET: ${BOT_SECRET}
      BACKEND_URL: http://backend:8000
      WEBHOOK_HOST: https://bot.${DOMAIN}
      CRON_SECRET: ${CRON_SECRET}
      UPTIME_SECRET: ${UPTIME_SECRET}
    networks:
      - web
    depends_on:
      backend:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.http.routers.bot.rule=Host(`bot.${DOMAIN}`)
      - traefik.http.routers.bot.entrypoints=websecure
      - traefik.http.routers.bot.tls.certresolver=letsencrypt
      - traefik.http.services.bot.loadbalancer.server.port=8080
      - traefik.docker.network=web

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: https://api.${DOMAIN}
        VITE_TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME}
    container_name: frontend
    restart: unless-stopped
    networks:
      - web
    labels:
      - traefik.enable=true
      - traefik.http.routers.frontend.rule=Host(`${DOMAIN}`)
      - traefik.http.routers.frontend.entrypoints=websecure
      - traefik.http.routers.frontend.tls.certresolver=letsencrypt
      - traefik.http.services.frontend.loadbalancer.server.port=80
      - traefik.docker.network=web

  portainer:
    image: portainer/portainer-ce:2.40.0
    container_name: portainer
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - portainer_data:/data
    networks:
      - web
    labels:
      - traefik.enable=true
      - traefik.http.routers.portainer.rule=Host(`portainer.${DOMAIN}`)
      - traefik.http.routers.portainer.entrypoints=websecure
      - traefik.http.routers.portainer.tls.certresolver=letsencrypt
      - traefik.http.routers.portainer.middlewares=admin-ip@docker
      - traefik.http.services.portainer.loadbalancer.server.port=9000
